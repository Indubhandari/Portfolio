<svg xmlns="http://www.w3.org/2000/svg" width="360" height="440" viewBox="0 0 360 440">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#15123A"/>
      <stop offset="100%" stop-color="#0C0C1F"/>
    </linearGradient>
    <linearGradient id="acc" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B7FFF"/>
      <stop offset="100%" stop-color="#C8B8FF"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="rgba(139,127,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(139,127,255,0)"/>
    </radialGradient>
    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="rgba(139,127,255,0.15)"/>
    </pattern>
  </defs>
  <rect width="360" height="440" fill="url(#bg)"/>
  <rect width="360" height="440" fill="url(#dots)"/>
  <ellipse cx="180" cy="220" rx="180" ry="180" fill="url(#glow)"/>
  <!-- head -->
  <circle cx="180" cy="155" r="72" fill="url(#acc)" opacity="0.35"/>
  <!-- body -->
  <ellipse cx="180" cy="345" rx="108" ry="88" fill="url(#acc)" opacity="0.28"/>
  <!-- inner ring -->
  <circle cx="180" cy="155" r="52" fill="none" stroke="url(#acc)" stroke-width="1.5" opacity="0.5"/>
  <!-- label -->
  <rect x="60" y="408" width="240" height="22" rx="4" fill="rgba(139,127,255,0.12)"/>
  <text x="180" y="422" text-anchor="middle" fill="rgba(200,184,255,0.7)"
    font-family="system-ui,sans-serif" font-size="11" font-weight="500">
    Replace with your photo → /public/profile.jpg
  </text>
</svg>
